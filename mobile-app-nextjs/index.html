<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#2563eb" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Matanuska Driver" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="description" content="Fleet management driver application for Matanuska" />
    
    <!-- Remove this line - PWA plugin will inject it -->
    <!-- <link rel="manifest" href="/manifest.json" /> -->
    
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512x512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <title>Matanuska Driver App</title>
    <style>
        #root {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        .app-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            background: #f8fafc;
        }

        .app-loading .spinner {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: #2563eb;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
                transform: scale(0.95);
            }
            50% {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div id="root">
        <div class="app-loading">
            <div class="spinner"></div>
        </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
